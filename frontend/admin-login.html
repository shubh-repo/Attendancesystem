<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login - St GNG School</title>
    <link rel="manifest" href="./manifest.json" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="./app.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <style>
        body {
            max-width: 480px !important;
            margin: 0 auto !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1) !important;
            position: relative;
            background-color: #f8fafc;
            /* To make the container stand out on PC */
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.4) !important;
            }
        }
    </style>
</head>

<body class="font-display text-slate-900 dark:text-slate-100 antialiased bg-slate-50 dark:bg-slate-950">
    <div class="relative flex min-h-screen w-full max-w-[480px] mx-auto flex-col overflow-x-hidden selection:bg-violet-500/20 bg-slate-50 shadow-2xl">

        <!-- Decorative Top Element -->
        <div class="absolute top-0 inset-x-0 h-40 bg-gradient-to-br from-violet-500/10 to-fuchsia-500/5 z-0 rounded-b-3xl"></div>

        <!-- Top Navigation Area -->
        <div class="flex items-center p-6 justify-between relative z-10 w-full pt-12 pb-6">
            <a href="./index.html" class="flex size-10 items-center justify-center rounded-full bg-white hover:bg-slate-50 border border-slate-200 text-slate-500 hover:text-slate-800 transition-all shadow-sm">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            </a>
            <div class="flex flex-col items-center justify-center absolute left-1/2 -translate-x-1/2 space-y-2">
                <div class="flex size-14 items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-100 text-violet-600">
                    <span class="material-symbols-outlined text-3xl">admin_panel_settings</span>
                </div>
            </div>
            <div class="size-10"></div> <!-- Placeholder for centering -->
        </div>

        <!-- Content Area -->
        <div class="flex flex-col px-5 pt-6 pb-10 flex-1 relative z-10">
            <div class="text-center mb-6">
                <h1 class="text-slate-900 tracking-tight text-3xl font-extrabold leading-tight mb-1">
                    Admin Portal
                </h1>
                <p class="text-slate-500 text-sm font-medium">St GNG School Management</p>
            </div>

            <!-- Clean White Card -->
            <div class="space-y-4 max-w-[480px] mx-auto w-full bg-white p-6 sm:p-7 rounded-[28px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/60">
                <!-- Input Field -->
                <div class="flex flex-col w-full relative group">
                    <p class="text-slate-700 text-sm font-bold mb-1.5 ml-1">Admin Username</p>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-violet-600 transition-colors z-10 text-[20px]">shield_person</span>
                        <input id="mobileInput"
                            class="form-input w-full rounded-[18px] text-slate-900 outline-none focus:ring-2 focus:ring-violet-500/20 border border-slate-200 focus:border-violet-500 bg-slate-50/50 hover:bg-slate-50 h-[54px] placeholder:text-slate-400 pl-[44px] pr-4 text-[15px] font-medium transition-all"
                            placeholder="Enter admin username" type="text" value="" autocomplete="username" />
                    </div>
                </div>

                <!-- Password -->
                <div class="flex flex-col w-full relative group">
                    <p class="text-slate-700 text-sm font-bold mb-1.5 ml-1">Passcode</p>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-violet-600 transition-colors z-10 text-[20px]">lock_person</span>
                        <input id="passwordInput"
                            class="form-input w-full rounded-[18px] text-slate-900 outline-none focus:ring-2 focus:ring-violet-500/20 border border-slate-200 focus:border-violet-500 bg-slate-50/50 hover:bg-slate-50 h-[54px] placeholder:text-slate-400 pl-[44px] pr-4 text-[15px] font-medium transition-all"
                            placeholder="••••••••" type="password" value="" autocomplete="current-password" />
                    </div>
                </div>

                <div class="flex items-center justify-between pt-1 pb-1 px-1">
                     <label class="flex items-center gap-2.5 cursor-pointer group">
                        <div class="relative flex items-center justify-center">
                            <input class="peer sr-only" type="checkbox" id="rememberMe" />
                            <div class="w-5 h-5 rounded-md border-2 border-slate-300 bg-white peer-checked:bg-violet-600 peer-checked:border-violet-600 flex items-center justify-center transition-all">
                                <span class="material-symbols-outlined text-[14px] text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                            </div>
                        </div>
                        <span class="text-[13px] text-slate-600 font-semibold select-none group-hover:text-slate-900 transition-colors">Remember me</span>
                    </label>
                    <a class="text-[13px] font-bold text-violet-600 hover:text-violet-500 transition-colors"
                        href="https://wa.me/918423926608?text=Teacher%20Attendance%20App%20-%20Admin%20Support%20Required"
                        target="_blank">Need help?</a>
                </div>

                <!-- Login Button -->
                <div class="pt-3">
                    <button id="loginBtn"
                        class="w-full h-[54px] bg-violet-600 hover:bg-violet-700 text-white font-bold text-[15px] rounded-[18px] shadow-lg shadow-violet-500/25 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                        <span>Authorize Access</span>
                        <span class="material-symbols-outlined text-[20px]">admin_panel_settings</span>
                    </button>
                    <p id="errorMsg" class="mt-4 p-3.5 bg-red-50 border border-red-100 rounded-xl text-red-500 text-sm font-semibold text-center hidden shadow-sm"></p>
                </div>
            </div>

            <!-- Support Footer -->
            <div class="mt-auto pt-16 text-center">
                <div class="flex justify-center items-center gap-1.5 text-slate-500 mb-3 bg-white w-fit mx-auto px-4 py-1.5 rounded-full border border-slate-200 shadow-sm">
                    <span class="material-symbols-outlined text-[14px] text-violet-500">admin_meds</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-600">Restricted Area</span>
                </div>
                <p class="text-[12px] text-slate-500 font-medium">
                    System Administration Panel
                </p>
            </div>
        </div>
    </div>
    </div>
    <script>
        const btn = document.getElementById('loginBtn');
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('mobileInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.innerText = 'Please enter both username and password.';
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const data = await App.fetchAPI('/auth/admin/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                App.setToken(data.token, data.user);
                window.location.replace('./admin-dashboard.html');
            } catch (e) {
                let msg = e.message;
                if (msg.toLowerCase().includes('fetch') || msg.toLowerCase().includes('network')) {
                    msg = '⚠️ Cannot connect to server. Make sure the backend is running.';
                }
                errorMsg.innerText = msg;
                errorMsg.classList.remove('hidden');
                btn.innerHTML = '<span>Login</span><span class="material-symbols-outlined">login</span>';
                btn.disabled = false;
            }
        });
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
    <!-- SW registration handled by app.js -->
</body>

</html>
