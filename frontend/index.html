<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Teacher Attendance Login - St GNG School</title>
    <link rel="manifest" href="./manifest.json" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="./app.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <style>
        body {
            max-width: 480px !important;
            margin: 0 auto !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1) !important;
            position: relative;
            background-color: #f8fafc;
            /* To make the container stand out on PC */
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.4) !important;
            }
        }
    </style>
</head>

<body class="font-display text-slate-900 dark:text-slate-100 antialiased bg-slate-50 dark:bg-slate-950">
    <div class="relative flex h-auto min-h-screen w-full max-w-[480px] mx-auto shadow-2xl flex-col bg-[#0B1120] overflow-hidden isolate selection:bg-primary/30">
        
        <!-- Decorative Background Elements -->
        <div class="absolute top-0 inset-x-0 h-64 bg-gradient-to-b from-primary/10 to-transparent pointer-events-none"></div>
        <div class="absolute -top-24 -left-20 w-72 h-72 bg-primary/20 rounded-full mix-blend-screen blur-[80px] animate-pulse opacity-60"></div>
        <div class="absolute top-40 -right-20 w-72 h-72 bg-indigo-500/20 rounded-full mix-blend-screen blur-[80px] animate-pulse opacity-60" style="animation-delay: 2s;"></div>
        
        <!-- Top Navigation Area -->
        <div class="flex items-center p-6 justify-center relative z-10 w-full pt-14 pb-6">
            <div class="flex flex-col items-center justify-center space-y-4">
                <div class="flex size-16 items-center justify-center bg-gradient-to-tr from-primary to-indigo-500 rounded-2xl shadow-lg shadow-primary/30 transform transition-transform hover:scale-105 border border-white/10">
                    <span class="material-symbols-outlined text-white text-3xl">school</span>
                </div>
                <h2 class="text-white text-xl font-bold tracking-wide">St GNG School</h2>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex flex-col px-6 pt-4 pb-10 flex-1 relative z-10">
            <div class="text-center mb-8 pt-2">
                <h1 class="text-white tracking-tight text-3xl font-extrabold leading-tight mb-2">
                    Welcome Back
                </h1>
                <p class="text-slate-400 text-sm font-medium">Teacher Attendance Portal</p>
            </div>

            <!-- Glassy Card Form container -->
            <div class="space-y-5 max-w-[480px] mx-auto w-full bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 p-6 sm:p-8 rounded-3xl shadow-2xl">
                <!-- Input Field -->
                <div class="flex flex-col w-full relative group">
                    <p class="text-slate-300 text-sm font-semibold mb-2 ml-1">Teacher ID / Mobile</p>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors z-10 text-[20px]">person</span>
                        <input id="mobileInput"
                            class="form-input w-full rounded-2xl text-white outline-none focus:ring-2 focus:ring-primary/50 border border-slate-600/50 focus:border-primary/50 bg-slate-900/50 hover:bg-slate-900/80 h-14 placeholder:text-slate-500 pl-[44px] pr-4 text-[15px] font-medium transition-all shadow-inner"
                            placeholder="Enter your mobile number" type="text" value="" autocomplete="username" />
                    </div>
                </div>

                <!-- Password -->
                <div class="flex flex-col w-full relative group">
                    <p class="text-slate-300 text-sm font-semibold mb-2 ml-1">Passcode</p>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors z-10 text-[20px]">lock</span>
                        <input id="passwordInput"
                            class="form-input w-full rounded-2xl text-white outline-none focus:ring-2 focus:ring-primary/50 border border-slate-600/50 focus:border-primary/50 bg-slate-900/50 hover:bg-slate-900/80 h-14 placeholder:text-slate-500 pl-[44px] pr-4 text-[15px] font-medium transition-all shadow-inner"
                            placeholder="••••••••" type="password" value="" autocomplete="current-password" />
                    </div>
                </div>

                <div class="flex items-center justify-between pt-1 pb-2 px-1">
                    <label class="flex items-center gap-2.5 cursor-pointer group">
                        <div class="relative flex items-center justify-center">
                            <input class="peer sr-only" type="checkbox" id="rememberMe" />
                            <div class="w-5 h-5 rounded-[6px] border-[1.5px] border-slate-500/50 bg-slate-900/50 peer-checked:bg-primary peer-checked:border-primary flex items-center justify-center transition-all">
                                <span class="material-symbols-outlined text-[14px] text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                            </div>
                        </div>
                        <span class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors font-medium select-none">Remember me</span>
                    </label>
                    <a class="text-sm font-semibold text-primary hover:text-blue-400 transition-colors"
                        href="https://wa.me/918423926608?text=Teacher%20Attendance%20App%20-%20Forgot%20ID%20or%20Password%20Help%20Required"
                        target="_blank">Forgot ID?</a>
                </div>

                <!-- Login Button -->
                <div class="pt-2">
                    <button id="loginBtn"
                        class="w-full h-14 bg-gradient-to-r from-primary to-blue-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-[15px] rounded-2xl shadow-[0_0_20px_rgba(28,116,233,0.3)] flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-slate-900">
                        <span>Secure Login</span>
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                    </button>
                    <p id="errorMsg" class="mt-4 p-3.5 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm font-semibold text-center hidden shadow-sm"></p>
                </div>
            </div>
            
            <div class="pt-8 text-center flex flex-col items-center">
                <a href="./admin-login.html"
                    class="group inline-flex items-center gap-2.5 px-6 py-3.5 rounded-full font-semibold text-[13px] text-slate-400 hover:text-white bg-slate-800/30 hover:bg-slate-700/50 border border-slate-700/50 transition-all backdrop-blur-sm shadow-sm hover:shadow-md">
                    <span class="material-symbols-outlined text-[18px] group-hover:text-primary transition-colors">admin_panel_settings</span>
                    Admin Access Portal
                </a>
            </div>

            <!-- Support Footer -->
            <div class="mt-auto pt-8 text-center">
                <div class="flex justify-center items-center gap-1.5 text-slate-500 mb-4 bg-slate-800/40 w-fit mx-auto px-4 py-1.5 rounded-full border border-slate-700/50 shadow-inner">
                    <span class="material-symbols-outlined text-[14px] text-emerald-400">bolt</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-300">Fast & Secure</span>
                </div>
                <p class="text-[13px] text-slate-500 font-medium">
                    Need assistance? <a class="text-primary hover:text-blue-400 transition-colors font-semibold"
                        href="https://wa.me/918423926608"
                        target="_blank" rel="noopener">Contact Support</a>
                </p>
            </div>
        </div>
    </div>
    </div>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const mobile = document.getElementById('mobileInput').value.trim();
            const passcode = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            if (!mobile) {
                errorMsg.innerText = 'Please enter your mobile number.';
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const data = await App.fetchAPI('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ mobile, passcode })
                });

                App.setToken(data.token, data.user);
                window.location.replace('./dashboard.html');
            } catch (e) {
                let msg = e.message;
                if (msg.toLowerCase().includes('fetch') || msg.toLowerCase().includes('network')) {
                    msg = '⚠️ Cannot connect to server. Please make sure the backend server is running.';
                }
                errorMsg.innerText = msg;
                errorMsg.classList.remove('hidden');
                btn.innerHTML = '<span>Login</span><span class="material-symbols-outlined">login</span>';
                btn.disabled = false;
            }
        });

        // Also allow Enter key to trigger login
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('mobileInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
    <!-- SW registration handled by app.js -->
</body>

</html>
