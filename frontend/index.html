<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Teacher Attendance Login - St GNG School</title>
    <link rel="manifest" href="./manifest.json" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="./app.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

    <style>
        body {
            max-width: 480px !important;
            margin: 0 auto !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1) !important;
            position: relative;
            background-color: #f8fafc;
            /* To make the container stand out on PC */
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.4) !important;
            }
        }
    </style>
</head>

<body class="font-display text-slate-900 dark:text-slate-100 antialiased bg-slate-50 dark:bg-slate-950">
    <div
        class="relative flex h-auto min-h-screen w-full max-w-[480px] mx-auto shadow-2xl flex-col bg-gradient-to-br from-indigo-50 via-white to-blue-50 dark:from-slate-900 dark:via-slate-950 dark:to-indigo-950 overflow-x-hidden">
        <!-- Top Navigation -->
        <div
            class="flex items-center p-4 pb-2 justify-between bg-transparent border-b border-white/20 dark:border-white/5">
            <div class="flex size-12 shrink-0 items-center justify-start">
                <span class="material-symbols-outlined text-primary">school</span>
            </div>
            <h2
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                St GNG School</h2>
        </div>
        <!-- Removed inline image section -->
        <!-- Content Area -->
        <div class="flex flex-col px-6 pt-8 pb-10">
            <h1
                class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-2">
                Teacher Attendance</h1>
            <p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-8 text-center">Please
                sign in with your credentials to continue</p>
            <div class="space-y-6 max-w-[480px] mx-auto w-full">
                <!-- Input Field -->
                <div class="flex flex-col w-full">
                    <label class="flex flex-col w-full">
                        <p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal pb-2">Teacher
                            ID / Mobile</p>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                            <input id="mobileInput"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-700/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal leading-normal transition-all"
                                placeholder="Enter your mobile number" type="text" value="" autocomplete="username" />
                        </div>
                    </label>
                </div>
                <!-- Password/PIN (Implicitly often needed with ID) -->
                <div class="flex flex-col w-full">
                    <label class="flex flex-col w-full">
                        <p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal pb-2">Passcode
                        </p>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                            <input id="passwordInput"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-700/50 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal leading-normal transition-all"
                                placeholder="••••••••" type="password" value="" autocomplete="new-password" />
                        </div>
                    </label>
                </div>
                <div class="flex items-center justify-between py-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input
                            class="rounded border-slate-300 text-primary focus:ring-primary dark:bg-slate-800 dark:border-slate-700"
                            type="checkbox" />
                        <span class="text-sm text-slate-600 dark:text-slate-400">Remember me</span>
                    </label>
                    <a class="text-sm font-bold text-primary hover:underline"
                        href="https://wa.me/918423926608?text=Teacher%20Attendance%20App%20-%20Forgot%20ID%20or%20Password%20Help%20Required"
                        target="_blank">Forgot ID?</a>
                </div>
                <!-- Login Button -->
                <div class="pt-4">
                    <button id="loginBtn"
                        class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                        <span>Login</span>
                        <span class="material-symbols-outlined">login</span>
                    </button>
                    <p id="errorMsg" class="text-red-500 text-sm mt-3 text-center hidden"></p>
                </div>

                <div class="pt-2 text-center">
                    <a href="./admin-login.html"
                        class="inline-flex w-full justify-center items-center gap-2 px-4 py-3 border-2 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 rounded-xl font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
                        Go to Admin Portal
                    </a>
                </div>
            </div>
            <!-- Support Footer -->
            <div class="mt-auto pt-8 pb-6 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-500">
                    Having trouble? <a class="text-primary font-medium hover:underline"
                        href="https://wa.me/918423926608?text=Teacher%20Attendance%20App%20-%20Login%20Help%20Required"
                        target="_blank" rel="noopener">Contact Administrator</a>
                </p>
                <div class="mt-8 flex justify-center items-center gap-2 text-slate-400">
                    <span class="material-symbols-outlined text-sm">verified_user</span>
                    <span class="text-xs uppercase tracking-widest font-semibold">Secure Portal</span>
                </div>
            </div>
        </div>
    </div>
    </div>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const mobile = document.getElementById('mobileInput').value.trim();
            const passcode = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            if (!mobile) {
                errorMsg.innerText = 'Please enter your mobile number.';
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const data = await App.fetchAPI('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ mobile, passcode })
                });

                App.setToken(data.token, data.user);
                window.location.replace('./dashboard.html');
            } catch (e) {
                let msg = e.message;
                if (msg.toLowerCase().includes('fetch') || msg.toLowerCase().includes('network')) {
                    msg = '⚠️ Cannot connect to server. Please make sure the backend server is running.';
                }
                errorMsg.innerText = msg;
                errorMsg.classList.remove('hidden');
                btn.innerHTML = '<span>Login</span><span class="material-symbols-outlined">login</span>';
                btn.disabled = false;
            }
        });

        // Also allow Enter key to trigger login
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('mobileInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
    <!-- SW registration handled by app.js -->
</body>

</html>
