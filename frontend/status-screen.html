<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="manifest" href="./manifest.json" />
    <script src="./app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#1c74e9", "background-light": "#f6f7f8", "background-dark": "#111821" },
                    fontFamily: { "display": ["Lexend"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Attendance Status</title>
    <style>
        body {
            max-width: 480px !important;
            margin: 0 auto !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1) !important;
            background-color: #f8fafc;
            font-family: 'Lexend', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-pop {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .anim-fade {
            animation: fadeInUp 0.4s ease both;
        }

        .anim-delay-1 {
            animation-delay: 0.15s;
        }

        .anim-delay-2 {
            animation-delay: 0.3s;
        }

        .anim-delay-3 {
            animation-delay: 0.45s;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="flex items-center bg-white dark:bg-slate-900 p-4 sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
        <a href="./dashboard.html"
            class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-lg font-bold flex-1 text-center pr-10">Attendance Status</h1>
    </header>

    <main class="flex-1 flex flex-col px-4 py-8 pb-28 max-w-[480px] mx-auto w-full">
        <!-- Success Icon -->
        <div class="flex flex-col items-center gap-6">
            <div class="relative w-52 h-52 flex items-center justify-center anim-pop">
                <div class="absolute inset-0 bg-primary/10 rounded-full"></div>
                <div class="absolute inset-4 bg-primary/20 rounded-full animate-ping" style="animation-duration: 2s;">
                </div>
                <div class="relative bg-primary text-white p-8 rounded-full shadow-2xl shadow-primary/30 z-10">
                    <span class="material-symbols-outlined text-7xl" id="statusIcon">check_circle</span>
                </div>
            </div>

            <div class="text-center anim-fade anim-delay-1">
                <h2 class="text-2xl font-bold" id="statusTitle">Attendance Recorded!</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1" id="statusMessage">Your attendance has been
                    logged successfully.</p>
            </div>

            <button onclick="window.location.href = './dashboard.html'"
                class="min-w-[200px] bg-primary text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-primary/30 active:scale-95 transition-all anim-fade anim-delay-2">
                Back to Dashboard
            </button>
        </div>

        <!-- Session Details -->
        <section class="mt-10 anim-fade anim-delay-3">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-base">Today's Session</h3>
                <span
                    class="bg-green-100 text-green-700 text-xs font-bold px-2.5 py-1 rounded-full uppercase">Verified</span>
            </div>

            <div class="space-y-3">
                <!-- Check-In Card -->
                <div
                    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="material-symbols-outlined text-primary text-xl">login</span>
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Check In</p>
                    </div>
                    <p class="text-2xl font-bold text-slate-900 dark:text-white" id="displayInTime">—</p>
                    <p class="text-xs text-slate-400 mt-0.5" id="displayInStatus">Loading...</p>
                </div>

                <!-- Check-Out Card -->
                <div id="checkoutCard"
                    class="bg-white dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl p-4">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="material-symbols-outlined text-slate-400 text-xl">logout</span>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Check Out</p>
                    </div>
                    <p class="text-xl font-bold text-slate-400 italic" id="displayOutTime">Not checked out yet</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-3 pb-8 pt-2 flex justify-around items-center max-w-[480px] mx-auto w-full">
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./dashboard.html">
            <span class="material-symbols-outlined">home</span>
            <p class="text-[10px] font-bold uppercase">Home</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./attendance-history.html">
            <span class="material-symbols-outlined">history</span>
            <p class="text-[10px] font-bold uppercase">History</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./profile.html">
            <span class="material-symbols-outlined">person</span>
            <p class="text-[10px] font-bold uppercase">Profile</p>
        </a>
    </nav>

    <script>
        // Handle URL params for messages
        const params = new URLSearchParams(window.location.search);
        const msg = params.get('msg');
        const isError = params.get('error') === 'true';

        if (msg) {
            document.getElementById('statusMessage').innerText = decodeURIComponent(msg);
            if (isError) {
                document.getElementById('statusTitle').innerText = 'Action Failed';
                document.getElementById('statusTitle').classList.add('text-red-500');
                document.getElementById('statusIcon').innerText = 'error';
                document.querySelector('.bg-primary.rounded-full').classList.replace('bg-primary', 'bg-red-500');
            }
        }

        // Load real attendance data
        async function loadTodaySession() {
            try {
                const res = await App.fetchAPI('/attendance/my/today');
                const r = res.attendance;
                if (!r) return;

                if (r.in_time) {
                    const [h, m] = r.in_time.split(':');
                    const hr = parseInt(h);
                    const ampm = hr >= 12 ? 'PM' : 'AM';
                    const hr12 = hr > 12 ? hr - 12 : hr === 0 ? 12 : hr;
                    document.getElementById('displayInTime').innerText = `${hr12}:${m} ${ampm}`;
                    document.getElementById('displayInStatus').innerText =
                        r.status === 'Late' ? `⚠️ Late by ${r.late_minutes || '?'} minutes` :
                            r.status === 'Present' ? '✅ On Time' : r.status;
                    if (r.status === 'Late') {
                        document.getElementById('displayInStatus').classList.add('text-amber-500');
                    } else {
                        document.getElementById('displayInStatus').classList.add('text-green-600');
                    }
                }

                if (r.out_time) {
                    const [h, m] = r.out_time.split(':');
                    const hr = parseInt(h);
                    const ampm = hr >= 12 ? 'PM' : 'AM';
                    const hr12 = hr > 12 ? hr - 12 : hr === 0 ? 12 : hr;
                    document.getElementById('displayOutTime').innerText = `${hr12}:${m} ${ampm}`;
                    document.getElementById('displayOutTime').classList.remove('text-slate-400', 'italic');
                    document.getElementById('displayOutTime').classList.add('text-slate-900', 'dark:text-white');
                    document.getElementById('checkoutCard').classList.remove('border-dashed', 'border-slate-200', 'dark:border-slate-700');
                    document.getElementById('checkoutCard').classList.add('border-slate-200');
                }
            } catch (e) {
                console.error('Failed to load today session', e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadTodaySession);
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(r => console.log('[SW] Registered:', r.scope))
        .catch(e => console.warn('[SW] Registration failed:', e));
    });
  }
</script>
</body>

</html>
