<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Dashboard – St. GNG School</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="manifest" href="./manifest.json" />
    <script src="./app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#1c74e9", "background-light": "#f6f7f8", "background-dark": "#111821" },
                    fontFamily: { "display": ["Lexend"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            max-width: 480px !important;
            margin: 0 auto !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1) !important;
            background-color: #f8fafc;
            font-family: 'Lexend', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.4) !important;
            }
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header
        class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-primary p-2 rounded-lg text-white">
                <span class="material-symbols-outlined block">school</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight">St. GNG School</h1>
        </div>
        <a href="./admin-profile.html"
            class="w-9 h-9 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30 hover:bg-primary/30 transition-colors">
            <span class="text-xs font-bold text-primary">AD</span>
        </a>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 pb-28 max-w-md mx-auto w-full">
        <!-- Date & Welcome -->
        <div class="mb-6">
            <p id="currentDate" class="text-slate-500 text-sm font-medium"></p>
            <h2 class="text-2xl font-bold">Attendance Overview</h2>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div
                class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-outlined text-primary text-xl">groups</span>
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Teachers</span>
                </div>
                <p id="statTeachers" class="text-2xl font-bold">—</p>
            </div>
            <div
                class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-outlined text-green-500 text-xl">check_circle</span>
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Present</span>
                </div>
                <p id="statPresent" class="text-2xl font-bold">—</p>
            </div>
            <div
                class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-outlined text-red-500 text-xl">cancel</span>
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Absent</span>
                </div>
                <p id="statAbsent" class="text-2xl font-bold">—</p>
            </div>
            <div
                class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-outlined text-amber-500 text-xl">schedule</span>
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Late</span>
                </div>
                <p id="statLate" class="text-2xl font-bold">—</p>
            </div>
        </div>

        <!-- Weekly Chart -->
        <div
            class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 mb-6">
            <div class="flex items-center justify-between mb-5">
                <h3 class="font-bold">Weekly Attendance</h3>
                <span class="text-xs text-primary font-semibold bg-primary/10 px-2 py-1 rounded-full">Last 7 Days</span>
            </div>
            <div id="weeklyChart" class="flex items-end justify-between h-28 gap-2 px-1">
                <div class="text-xs text-slate-400 text-center w-full animate-pulse">Loading...</div>
            </div>
        </div>

        <!-- Today's Alerts -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold">Today's Alerts</h3>
                <a class="text-xs font-bold text-primary hover:underline" href="./attendance-monitoring.html">View
                    All</a>
            </div>
            <div id="alertsList" class="space-y-2">
                <div class="text-center text-slate-400 text-sm py-4 animate-pulse">Loading...</div>
            </div>
        </div>
    </main>

    <!-- Admin Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-3 pb-8 pt-2 flex justify-around items-center max-w-[480px] mx-auto w-full">
        <a class="flex flex-col items-center flex-1 gap-1 text-primary" href="./admin-dashboard.html">
            <span class="material-symbols-outlined">home</span>
            <p class="text-[10px] font-bold uppercase">Home</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./teacher-management.html">
            <span class="material-symbols-outlined">group</span>
            <p class="text-[10px] font-bold uppercase">Teachers</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./attendance-monitoring.html">
            <span class="material-symbols-outlined">analytics</span>
            <p class="text-[10px] font-bold uppercase">Monitor</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./admin-settings.html">
            <span class="material-symbols-outlined">tune</span>
            <p class="text-[10px] font-bold uppercase">Settings</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
            href="./admin-profile.html">
            <span class="material-symbols-outlined">person</span>
            <p class="text-[10px] font-bold uppercase">Profile</p>
        </a>
    </nav>


    <script>
        const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        async function loadAdminDashboard() {
            App.checkAuth();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            // Load stats
            try {
                const stats = await App.fetchAPI('/admin/dashboard/stats');
                document.getElementById('statTeachers').innerText = stats.total_teachers ?? 0;
                // Show combined "who showed up" count (Present + Late + Half Day + Early Leave)
                document.getElementById('statPresent').innerText = stats.present_total ?? stats.present_today ?? 0;
                document.getElementById('statAbsent').innerText = stats.absent_today ?? 0;
                document.getElementById('statLate').innerText = stats.late_today ?? 0;
            } catch (err) { console.error('Failed stats', err); }

            // Load weekly chart
            try {
                const today = new Date();
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(today.getDate() - i);
                    days.push(d.toISOString().split('T')[0]);
                }

                const results = await Promise.all(
                    days.map(date => App.fetchAPI(`/admin/attendance/daily?date=${date}`).catch(() => []))
                );
                // Reuse stats from above; fallback count teachers from results
                const statTeachersEl = document.getElementById('statTeachers');
                const totalTeachers = parseInt(statTeachersEl?.innerText) || 1;

                document.getElementById('weeklyChart').innerHTML = results.map((records, i) => {
                    const d = new Date(days[i] + 'T00:00:00');
                    const dayOfWeek = d.getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                    // Safely check if records is an array, defaults to [] on API failure
                    const validRecords = Array.isArray(records) ? records : [];
                    const present = validRecords.filter(r => r.status === 'Present' || r.status === 'Late' || r.status === 'Early Leave' || r.status === 'Half Day').length;
                    const pct = Math.round((present / totalTeachers) * 100);
                    const isToday = i === 6;
                    return `<div class="flex flex-col items-center flex-1 gap-1.5">
                        <span class="text-[9px] font-bold text-slate-400" style="min-height:12px">${(!isWeekend && pct > 0) ? pct + '%' : ''}</span>
                        <div class="w-full rounded-t-lg relative overflow-hidden flex-1" style="height:100%; min-height:60px; background: ${isToday ? 'rgba(28,116,233,0.15)' : isWeekend ? 'rgba(100,116,139,0.05)' : 'rgba(100,116,139,0.1)'}">
                            <div class="absolute bottom-0 w-full rounded-t transition-all duration-700"
                                style="height:${isWeekend ? 0 : Math.max(pct, pct > 0 ? 4 : 0)}%; background:${isToday ? '#1c74e9' : isWeekend ? 'rgba(100,116,139,0.2)' : 'rgba(28,116,233,0.45)'}"></div>
                        </div>
                        <span class="text-[10px] font-bold ${isToday ? 'text-primary' : isWeekend ? 'text-slate-300 dark:text-slate-600' : 'text-slate-400'} uppercase">${DAYS[d.getDay()]}</span>
                    </div>`;
                }).join('');
            } catch (err) { console.error('Failed weekly chart', err); }

            // Load today's alerts
            try {
                const records = await App.fetchAPI('/admin/attendance/daily');
                const alertsEl = document.getElementById('alertsList');
                // Show Late, Absent, Half Day, and Early Leave in alerts
                const flagged = records.filter(r => ['Late', 'Absent', 'Half Day', 'Early Leave'].includes(r.status)).reverse();
                if (flagged.length === 0) {
                    alertsEl.innerHTML = `<div class="flex items-center gap-3 bg-green-50 dark:bg-green-900/20 p-4 rounded-xl border border-green-100 dark:border-green-800">
                        <span class="material-symbols-outlined text-green-500">check_circle</span>
                        <p class="text-sm font-medium text-green-700 dark:text-green-300">All teachers are on time today! 🎉</p>
                    </div>`;
                    return;
                }
                alertsEl.innerHTML = flagged.slice(0, 6).map(r => {
                    const colorMap = {
                        'Late': { bg: 'bg-amber-50 dark:bg-amber-900/20 border-amber-100 dark:border-amber-800', icon: 'schedule', iconColor: 'text-amber-500' },
                        'Absent': { bg: 'bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800', icon: 'event_busy', iconColor: 'text-red-500' },
                        'Half Day': { bg: 'bg-orange-50 dark:bg-orange-900/20 border-orange-100 dark:border-orange-800', icon: 'timelapse', iconColor: 'text-orange-500' },
                        'Early Leave': { bg: 'bg-purple-50 dark:bg-purple-900/20 border-purple-100 dark:border-purple-800', icon: 'directions_walk', iconColor: 'text-purple-500' },
                    };
                    const style = colorMap[r.status] || colorMap['Absent'];
                    let detail = r.status;
                    if (r.status === 'Late') detail = `Late by ${r.late_minutes || '?'} min`;
                    const time = r.in_time ? r.in_time.substring(0, 5) : '—';
                    return `<div class="flex items-center gap-3 bg-white dark:bg-slate-800 p-3 rounded-xl border ${style.bg}">
                        <span class="material-symbols-outlined ${style.iconColor} text-2xl">${style.icon}</span>
                        <div class="flex-1">
                            <p class="text-sm font-bold">${r.teacher_name || 'Unknown'}</p>
                            <p class="text-xs text-slate-500">${detail} • ${r.designation || ''}</p>
                        </div>
                        <span class="text-[10px] text-slate-400">${time}</span>
                    </div>`;
                }).join('');
            } catch (err) { document.getElementById('alertsList').innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Could not load alerts.</p>'; }
        }

        document.addEventListener('DOMContentLoaded', loadAdminDashboard);
    </script>
    <!-- SW registration handled by app.js -->
</body>

</html>
