<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Teacher Management Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="manifest" href="./manifest.json" />
    <script src="./app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Header / Top Bar -->
    <header
        class="sticky top-0 z-10 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary/10 rounded-lg text-primary">
                    <span class="material-symbols-outlined">school</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Teacher Management</h1>
            </div>
            <div class="flex items-center gap-2">
                <button
                    class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-xs border border-primary/30"
                    data-alt="Admin user avatar placeholder">
                    AD
                </div>
            </div>
        </div>
    </header>
    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 space-y-6">
        <!-- Action Bar -->
        <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:max-w-md">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input
                    class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                    placeholder="Search by name, ID or department..." type="text" />
            </div>
            <button onclick="document.getElementById('addTeacherModal').classList.remove('hidden')"
                class="w-full md:w-auto flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-sm">
                <span class="material-symbols-outlined">add</span>
                Add Teacher
            </button>
        </div>
        <!-- Department Filters -->
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
            <button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-primary text-white text-sm font-medium">All
                Departments</button>
            <button
                class="whitespace-nowrap px-4 py-1.5 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-sm font-medium hover:border-primary/50 transition-colors">Science</button>
            <button
                class="whitespace-nowrap px-4 py-1.5 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-sm font-medium hover:border-primary/50 transition-colors">Mathematics</button>
            <button
                class="whitespace-nowrap px-4 py-1.5 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-sm font-medium hover:border-primary/50 transition-colors">Arts</button>
            <button
                class="whitespace-nowrap px-4 py-1.5 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-sm font-medium hover:border-primary/50 transition-colors">History</button>
            <button
                class="whitespace-nowrap px-4 py-1.5 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-sm font-medium hover:border-primary/50 transition-colors">Languages</button>
        </div>
        <!-- Teacher List -->
        <div
            class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            <div
                class="hidden md:grid grid-cols-12 gap-4 px-6 py-3 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800 text-xs font-bold uppercase tracking-wider text-slate-500">
                <div class="col-span-5">Teacher</div>
                <div class="col-span-2">Teacher ID</div>
                <div class="col-span-3">Department</div>
                <div class="col-span-1">Status</div>
                <div class="col-span-1 text-right">Actions</div>
            </div>
            <div id="teachersList" class="divide-y divide-slate-100 dark:divide-slate-800">
                <div class="px-6 py-4 text-center">Loading...</div>
            </div>
        </div>
        <!-- Pagination -->
        <div class="flex items-center justify-between pt-4 border-t border-slate-200 dark:border-slate-800">
            <p class="text-sm text-slate-500">Showing <span
                    class="font-medium text-slate-900 dark:text-slate-100">4</span> of <span
                    class="font-medium text-slate-900 dark:text-slate-100">24</span> teachers</p>
            <div class="flex gap-2">
                <button
                    class="px-3 py-1 rounded-lg border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-medium transition-colors">Previous</button>
                <button
                    class="px-3 py-1 rounded-lg border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-medium transition-colors">Next</button>
            </div>
        </div>
    </main>
    <!-- Bottom Navigation Bar (Mobile) -->
    <nav
        class="sticky bottom-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 md:hidden">
        <div class="flex items-center justify-around py-2 px-4">
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors"
                href="./admin-dashboard.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-[10px] font-medium">Dashboard</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="./teacher-management.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">group</span>
                <span class="text-[10px] font-medium">Teachers</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors"
                href="./attendance-monitoring.html">
                <span class="material-symbols-outlined">analytics</span>
                <span class="text-[10px] font-medium">Monitor</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors"
                href="./admin-settings.html">
                <span class="material-symbols-outlined">settings</span>
                <span class="text-[10px] font-medium">Settings</span>
            </a>
        </div>
    </nav>

    <!-- Add Teacher Modal -->
    <div id="addTeacherModal"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-xl max-w-md w-full p-6 shadow-2xl relative">
            <h3 class="text-xl font-bold mb-4">Add New Teacher</h3>
            <p id="modalMsg" class="text-sm text-red-500 mb-4 hidden"></p>
            <form id="addTeacherForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Name</label>
                    <input id="nameInput" type="text"
                        class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mobile (Used for Login & Face matching)</label>
                    <input id="mobileInput" type="text"
                        class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Designation / subject</label>
                    <input id="designationInput" type="text"
                        class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800"
                        required>
                </div>
                <div class="flex items-center gap-2 pt-4">
                    <button type="button" onclick="document.getElementById('addTeacherModal').classList.add('hidden')"
                        class="flex-1 py-2 bg-slate-200 dark:bg-slate-700 rounded-lg font-bold">Cancel</button>
                    <button type="submit" class="flex-1 py-2 bg-primary text-white rounded-lg font-bold">Save
                        Teacher</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function loadTeachers() {
            try {
                const teachers = await App.fetchAPI('/admin/teachers');
                const list = document.getElementById('teachersList');

                if (teachers.length === 0) {
                    list.innerHTML = '<div class="px-6 py-4 text-center">No teachers found. Add one!</div>';
                    return;
                }

                list.innerHTML = teachers.map(t => `
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 px-6 py-4 items-center hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                <div class="col-span-5 flex items-center gap-4">
                    <div class="h-10 w-10 flex items-center justify-center rounded-full bg-primary/10 text-primary font-bold">
                        ${t.name.charAt(0)}
                    </div>
                    <div>
                        <p class="font-semibold text-slate-900 dark:text-slate-100">${t.name}</p>
                        <p class="text-sm text-slate-500">${t.mobile}</p>
                    </div>
                </div>
                <div class="col-span-2">
                    <span class="md:hidden text-xs font-bold text-slate-400 block uppercase">ID</span>
                    <code class="text-sm font-medium bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded">${t.id.substring(0, 8)}</code>
                </div>
                <div class="col-span-3">
                    <span class="md:hidden text-xs font-bold text-slate-400 block uppercase">Dept</span>
                    <p class="text-sm">${t.designation || 'Staff'}</p>
                </div>
                <div class="col-span-1">
                    <span class="md:hidden text-xs font-bold text-slate-400 block uppercase">Status</span>
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400">Active</span>
                </div>
                <div class="col-span-1 text-right flex justify-end gap-2">
                    <button onclick="deleteTeacher('${t.id}')" class="p-1.5 text-slate-400 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-xl">delete</span>
                    </button>
                </div>
            </div>`).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteTeacher(id) {
            if (!confirm('Are you sure you want to delete this teacher?')) return;
            try {
                await App.fetchAPI(`/admin/teachers/${id}`, { method: 'DELETE' });
                loadTeachers();
            } catch (e) { alert(e.message); }
        }

        document.getElementById('addTeacherForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('modalMsg');
            msg.classList.add('hidden');
            try {
                await App.fetchAPI('/admin/teachers', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('nameInput').value,
                        mobile: document.getElementById('mobileInput').value,
                        designation: document.getElementById('designationInput').value
                    })
                });
                document.getElementById('addTeacherModal').classList.add('hidden');
                e.target.reset();
                loadTeachers();
            } catch (err) {
                msg.innerText = err.message;
                msg.classList.remove('hidden');
            }
        };

        document.addEventListener('DOMContentLoaded', loadTeachers);
    </script>
</body>

</html>
