<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Teacher Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="manifest" href="./manifest.json" />
    <script src="./app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#1c74e9", "background-light": "#f6f7f8", "background-dark": "#111821" },
                    fontFamily: { "display": ["Lexend"] },
                },
            },
        }
    </script>
    <style>
        body {
            max-width: 480px !important;
            margin: 0 auto !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1) !important;
            background-color: #f8fafc;
            font-family: 'Lexend', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.4) !important;
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        .animate-shimmer {
            animation: shimmer 1s linear infinite;
            background: linear-gradient(to right, #f6f7f8 8%, #edeef1 18%, #f6f7f8 33%);
            background-size: 800px 104px;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header
        class="sticky top-0 z-10 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary/10 rounded-lg text-primary">
                    <span class="material-symbols-outlined">group</span>
                </div>
                <h1 class="text-lg font-bold">Teacher Management</h1>
            </div>
            <button onclick="openAddModal()"
                class="flex items-center gap-1 bg-primary text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-primary/90 transition-colors">
                <span class="material-symbols-outlined text-base">add</span>
                Add
            </button>
        </div>
    </header>

    <!-- Search -->
    <div class="px-4 pt-4 pb-2">
        <div class="relative">
            <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
            <input id="searchInput" oninput="filterTeachers()" type="text"
                placeholder="Search by name or designation..."
                class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary outline-none text-sm transition-all" />
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 py-2">
        <button onclick="setFilter('all')" id="tab-all"
            class="filter-tab flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium bg-primary text-white">All</button>
        <button onclick="setFilter('active')" id="tab-active"
            class="filter-tab flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300">Active</button>
        <button onclick="setFilter('blocked')" id="tab-blocked"
            class="filter-tab flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300">Blocked</button>
    </div>

    <!-- Teacher Cards List -->
    <main class="flex-1 p-4 pb-28 space-y-3" id="teachersList">
        <div class="text-center py-8 text-slate-400">Loading teachers...</div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-3 pb-8 pt-2 flex justify-around items-center max-w-[480px] mx-auto w-full">
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 hover:text-primary transition-colors" href="./admin-dashboard.html">
            <span class="material-symbols-outlined">home</span>
            <p class="text-[10px] font-bold uppercase">Home</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-primary" href="./teacher-management.html">
            <span class="material-symbols-outlined">group</span>
            <p class="text-[10px] font-bold uppercase">Teachers</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 hover:text-primary transition-colors" href="./attendance-monitoring.html">
            <span class="material-symbols-outlined">analytics</span>
            <p class="text-[10px] font-bold uppercase">Monitor</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 hover:text-primary transition-colors" href="./admin-settings.html">
            <span class="material-symbols-outlined">tune</span>
            <p class="text-[10px] font-bold uppercase">Settings</p>
        </a>
        <a class="flex flex-col items-center flex-1 gap-1 text-slate-400 hover:text-primary transition-colors" href="./admin-profile.html">
            <span class="material-symbols-outlined">person</span>
            <p class="text-[10px] font-bold uppercase">Profile</p>
        </a>
    </nav>


    <!-- ADD TEACHER MODAL -->
        <div id="addTeacherModal"
            class="hidden fixed inset-0 z-[100] flex items-end justify-center bg-black/50 backdrop-blur-sm">
            <div
                class="bg-white dark:bg-slate-900 rounded-t-2xl w-full max-w-[480px] p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
                <div class="flex items-center justify-between mb-5">
                    <h3 class="text-lg font-bold">Add New Teacher</h3>
                    <button onclick="closeAddModal()"
                        class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <p id="addMsg" class="text-sm text-red-500 mb-3 hidden"></p>
                <form id="addTeacherForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Full Name *</label>
                        <input id="nameInput" type="text" required placeholder="e.g. Manish Kumar"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Mobile Number * (Used for login)</label>
                        <input id="mobileInput" type="tel" required placeholder="10-digit mobile number"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Subject / Designation *</label>
                        <input id="designationInput" type="text" required placeholder="e.g. Science, Mathematics"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Initial Password</label>
                        <input id="initialPwdInput" type="password" placeholder="Leave blank to skip"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                        <p class="text-xs text-slate-400 mt-1">Teacher can change this later from their profile</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Email (Optional)</label>
                        <input id="emailInput" type="email" placeholder="teacher@school.com"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Joining Date (Optional)</label>
                        <input id="joiningInput" type="date"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeAddModal()"
                            class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-semibold text-sm">Cancel</button>
                        <button type="submit"
                            class="flex-1 py-3 bg-primary text-white rounded-xl font-semibold text-sm">Add
                            Teacher</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- RESET PASSWORD MODAL -->
        <div id="resetPasswordModal"
            class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
            <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">Reset Password</h3>
                    <button onclick="closeResetModal()"
                        class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <p class="text-sm text-slate-500 mb-4">Resetting password for: <strong id="resetTeacherName"></strong>
                </p>
                <p id="resetMsg" class="text-sm text-red-500 mb-3 hidden"></p>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">New Password</label>
                        <input id="newPasswordInput" type="password" placeholder="Min 4 characters"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm" />
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button onclick="closeResetModal()"
                            class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-semibold text-sm">Cancel</button>
                        <button onclick="confirmResetPassword()"
                            class="flex-1 py-3 bg-primary text-white rounded-xl font-semibold text-sm">Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let allTeachers = [];
            let activeFilter = 'all';
            let resetTeacherId = null;

            function openAddModal() { document.getElementById('addTeacherModal').classList.remove('hidden'); }
            function closeAddModal() { document.getElementById('addTeacherModal').classList.add('hidden'); }
            function closeResetModal() { document.getElementById('resetPasswordModal').classList.add('hidden'); resetTeacherId = null; }

            function setFilter(f) {
                activeFilter = f;
                document.querySelectorAll('.filter-tab').forEach(b => {
                    b.className = 'filter-tab flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300';
                });
                document.getElementById('tab-' + f).className = 'filter-tab flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium bg-primary text-white';
                filterTeachers();
            }

            function filterTeachers() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const filtered = allTeachers.filter(t => {
                    const matchSearch = !search || t.name.toLowerCase().includes(search) || (t.designation || '').toLowerCase().includes(search);
                    const matchFilter = activeFilter === 'all' || t.status === activeFilter;
                    return matchSearch && matchFilter;
                });
                renderTeachers(filtered);
            }

            function renderTeachers(teachers) {
                const list = document.getElementById('teachersList');
                if (teachers.length === 0) {
                    list.innerHTML = '<div class="text-center py-8 text-slate-400">No teachers found</div>';
                    return;
                }
                list.innerHTML = teachers.map(t => {
                    const initials = t.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    const isBlocked = t.status === 'blocked';
                    return `<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-4">
                    <div class="flex items-start gap-3">
                        <div class="w-12 h-12 flex-shrink-0 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-lg">${initials}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 justify-between">
                                <h3 class="font-bold text-slate-900 dark:text-white truncate">${t.name}</h3>
                                <span class="flex-shrink-0 inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${isBlocked ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${isBlocked ? 'Blocked' : 'Active'}</span>
                            </div>
                            <p class="text-sm text-primary font-medium mt-0.5">${t.designation || 'Staff'}</p>
                            <p class="text-xs text-slate-400 mt-0.5">📱 ${t.mobile}</p>
                            ${t.joining_date ? `<p class="text-xs text-slate-400">📅 Joined: ${new Date(t.joining_date).toLocaleDateString()}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex gap-2 mt-3 pt-3 border-t border-slate-100 dark:border-slate-800">
                        <button onclick="openResetPassword('${t.id}', '${t.name}')" class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-semibold bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                            <span class="material-symbols-outlined text-sm">lock_reset</span>Reset Password
                        </button>
                        <button onclick="toggleStatus('${t.id}', '${isBlocked ? 'active' : 'blocked'}')" class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-semibold ${isBlocked ? 'bg-green-50 text-green-700 hover:bg-green-100' : 'bg-amber-50 text-amber-700 hover:bg-amber-100'} transition-colors">
                            <span class="material-symbols-outlined text-sm">${isBlocked ? 'lock_open' : 'block'}</span>${isBlocked ? 'Unblock' : 'Block'}
                        </button>
                        <button onclick="deleteTeacher('${t.id}', '${t.name}')" class="flex items-center justify-center gap-1 py-2 px-3 rounded-lg text-xs font-semibold bg-red-50 text-red-600 hover:bg-red-100 transition-colors">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                </div>`;
                }).join('');
            }

            function openResetPassword(id, name) {
                resetTeacherId = id;
                document.getElementById('resetTeacherName').innerText = name;
                document.getElementById('newPasswordInput').value = '';
                document.getElementById('resetMsg').classList.add('hidden');
                document.getElementById('resetPasswordModal').classList.remove('hidden');
            }

            async function confirmResetPassword() {
                const password = document.getElementById('newPasswordInput').value.trim();
                const msg = document.getElementById('resetMsg');
                if (!password || password.length < 4) {
                    msg.innerText = 'Password must be at least 4 characters';
                    msg.classList.remove('hidden');
                    return;
                }
                try {
                    await App.fetchAPI('/auth/admin/reset-teacher-password', {
                        method: 'POST',
                        body: JSON.stringify({ teacher_id: resetTeacherId, new_password: password })
                    });
                    closeResetModal();
                    alert('Password reset successfully!');
                } catch (e) {
                    msg.innerText = e.message;
                    msg.classList.remove('hidden');
                }
            }

            async function toggleStatus(id, newStatus) {
                if (!confirm(`${newStatus === 'blocked' ? 'Block' : 'Unblock'} this teacher?`)) return;
                try {
                    await App.fetchAPI(`/admin/teachers/${id}/status`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
                    loadTeachers();
                } catch (e) { alert(e.message); }
            }

            async function deleteTeacher(id, name) {
                if (!confirm(`Delete teacher "${name}"? This cannot be undone.`)) return;
                try {
                    await App.fetchAPI(`/admin/teachers/${id}`, { method: 'DELETE' });
                    loadTeachers();
                } catch (e) { alert(e.message); }
            }

            document.getElementById('addTeacherForm').onsubmit = async (e) => {
                e.preventDefault();
                const msg = document.getElementById('addMsg');
                msg.classList.add('hidden');
                try {
                    await App.fetchAPI('/admin/teachers', {
                        method: 'POST',
                        body: JSON.stringify({
                            name: document.getElementById('nameInput').value,
                            mobile: document.getElementById('mobileInput').value,
                            designation: document.getElementById('designationInput').value,
                            password: document.getElementById('initialPwdInput').value || null,
                            email: document.getElementById('emailInput').value || null,
                            joining_date: document.getElementById('joiningInput').value || null,
                        })
                    });
                    closeAddModal();
                    e.target.reset();
                    loadTeachers();
                } catch (err) {
                    msg.innerText = err.message;
                    msg.classList.remove('hidden');
                }
            };

            async function loadTeachers() {
                try {
                    const teachers = await App.fetchAPI('/admin/teachers');
                    allTeachers = teachers;
                    filterTeachers();
                } catch (err) {
                    document.getElementById('teachersList').innerHTML = `<div class="text-center py-8 text-red-500">Error: ${err.message}</div>`;
                }
            }

            document.addEventListener('DOMContentLoaded', loadTeachers);
        </script>


        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/service-worker.js')
                        .then(r => console.log('[SW] Registered:', r.scope))
                        .catch(e => console.warn('[SW] Registration failed:', e));
                });
            }
        </script>
</body>

</html>
